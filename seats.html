<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FAFAF7">
  <title>龍之介と智華の結婚式</title>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="龍之介と智華の結婚式">
  <meta property="og:title" content="龍之介と智華の結婚式">
  <meta property="og:description" content="富山 龍之介 · 塩田 智華　2026.04.18">
  <meta property="og:image" content="https://10380r.github.io/ryunosuke-tomoka-wedding/ogp.png">
  <meta property="og:url" content="https://10380r.github.io/ryunosuke-tomoka-wedding/">
  <meta property="og:locale" content="ja_JP">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="龍之介と智華の結婚式">
  <meta name="twitter:description" content="富山 龍之介 · 塩田 智華　2026.04.18">
  <meta name="twitter:image" content="https://10380r.github.io/ryunosuke-tomoka-wedding/ogp.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&amp;family=Dela+Gothic+One&amp;family=Noto+Sans+JP:wght@300;400;800&amp;family=Noto+Serif+JP:wght@400;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
  <script src="seats.js" defer></script>
</head>
<body data-page="detail">
  <main class="page-frame">
    <header class="page-top">
      <a class="back-link" href="index.html" data-nav>← Top</a>
    </header>

    <section class="content-block">
      <div class="section-head">
        <h1 class="section-title">席次表</h1>
      </div>

      <div class="seat-switcher">
        <div class="seat-layout" id="seat-layout" aria-label="会場レイアウト">
          <p class="seat-layout-note">テーブル名をタップするとお席の詳細をご確認いただけます</p>

          <div class="floor-map">
            <div class="floor-couple" aria-hidden="true">
              新郎新婦席
            </div>

            <div class="floor-grid">
              <button class="floor-card stagger-item" type="button" data-table="omiya">
                大宮南高校のお友達
              </button>
              <button class="floor-card floor-card--tall stagger-item" type="button" data-table="future">
                フューチャーと<wbr>周辺のお友達
              </button>
              <button class="floor-card stagger-item" type="button" data-table="hokudai">
                北海道大学のお友達
              </button>
              <div class="floor-spacer" aria-hidden="true"></div>
            </div>

            <div class="floor-grid floor-grid--family">
              <button class="floor-card stagger-item" type="button" data-table="toyama">
                富山家
              </button>
              <button class="floor-card stagger-item" type="button" data-table="shiota">
                塩田家
              </button>
            </div>
          </div>
        </div>

        <div class="seat-detail" id="seat-detail" aria-live="polite">
          <button class="detail-back" id="detail-back" type="button">← 会場レイアウトへ戻る</button>
          <h2 class="seat-detail-title" id="seat-detail-title"></h2>
          <p class="seat-direction">↑ 新郎新婦席</p>
          <p class="seat-arrangement-note">上から新郎新婦席に近い順に並んでいます</p>
          <div class="seat-grid" id="seat-grid"></div>
        </div>
      </div>
    </section>

    <footer class="footer-nav">
      <a class="footer-home" href="index.html" data-nav>Top へ戻る</a>
    </footer>
  </main>
</body>
</html>
